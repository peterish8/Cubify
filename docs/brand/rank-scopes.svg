<svg xmlns="http://www.w3.org/2000/svg" width="480" height="160" viewBox="0 0 480 160" fill="none" role="img" aria-label="Rank scopes NR CR WR">
  <rect width="480" height="160" rx="18" fill="#020617" stroke="#3b82f6" stroke-opacity="0.3"/>
  <!-- cube -->
  <g transform="translate(36,40) scale(2.6)">
    <path d="M16 3L28 10L16 17L4 10L16 3Z" fill="#E8E8EC"/>
    <path d="M4 10L16 17V29L4 22V10Z" fill="#3DFFA8"/>
    <path d="M16 17L28 10V22L16 29V17Z" fill="#FFC14A"/>
  </g>
  <!-- NR -->
  <rect x="140" y="28" width="96" height="36" rx="10" fill="#0f2a1c" stroke="#3DFFA8" stroke-width="1.5"/>
  <text x="188" y="51" text-anchor="middle" fill="#3DFFA8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800">NR</text>
  <text x="188" y="80" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">National</text>
  <!-- CR -->
  <rect x="252" y="28" width="96" height="36" rx="10" fill="#2a200c" stroke="#FFC14A" stroke-width="1.5"/>
  <text x="300" y="51" text-anchor="middle" fill="#FFC14A" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800">CR</text>
  <text x="300" y="80" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">Continental</text>
  <!-- WR -->
  <rect x="364" y="28" width="96" height="36" rx="10" fill="#1c1c20" stroke="#E8E8EC" stroke-width="1.5"/>
  <text x="412" y="51" text-anchor="middle" fill="#E8E8EC" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800">WR</text>
  <text x="412" y="80" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">World</text>
  <text x="300" y="120" text-anchor="middle" fill="#60a5fa" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">Logo faces = rank scopes · same chips in the UI</text>
  <text x="300" y="140" text-anchor="middle" fill="#3b82f6" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">Top % = rank ÷ ranked competitors × 100</text>
</svg>
