<svg xmlns="http://www.w3.org/2000/svg" width="960" height="220" viewBox="0 0 960 220" fill="none" role="img" aria-label="Cubify Blue Matrix hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0b1224"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#1d4ed8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#3b82f6" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0"/>
      <stop offset="50%" stop-color="#60a5fa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="960" height="220" rx="20" fill="url(#bg)"/>
  <rect width="960" height="220" rx="20" fill="url(#grid)"/>
  <rect width="960" height="220" rx="20" fill="url(#glow)"/>
  <rect x="0" y="70" width="960" height="48" fill="url(#scan)"/>
  <!-- floating cubes -->
  <g transform="translate(120,70) scale(1.6)" opacity="0.35">
    <path d="M16 3L28 10L16 17L4 10L16 3Z" fill="#dbeafe"/>
    <path d="M4 10L16 17V29L4 22V10Z" fill="#3DFFA8"/>
    <path d="M16 17L28 10V22L16 29V17Z" fill="#FFC14A"/>
  </g>
  <g transform="translate(780,55) scale(1.35)" opacity="0.28">
    <path d="M16 3L28 10L16 17L4 10L16 3Z" fill="#dbeafe"/>
    <path d="M4 10L16 17V29L4 22V10Z" fill="#3DFFA8"/>
    <path d="M16 17L28 10V22L16 29V17Z" fill="#FFC14A"/>
  </g>
  <!-- main cube -->
  <g transform="translate(432,58) scale(3.2)">
    <path d="M16 3L28 10L16 17L4 10L16 3Z" fill="#E8E8EC"/>
    <path d="M4 10L16 17V29L4 22V10Z" fill="#3DFFA8"/>
    <path d="M16 17L28 10V22L16 29V17Z" fill="#FFC14A"/>
    <path d="M16 3L28 10L16 17L4 10L16 3Z M4 10L16 17V29L4 22V10Z M16 17L28 10V22L16 29V17Z" stroke="#020617" stroke-width="0.5" stroke-linejoin="round" opacity="0.3"/>
  </g>
  <!-- title -->
  <text x="480" y="48" text-anchor="middle" fill="#dbeafe" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="4">BLUE MATRIX</text>
  <text x="480" y="200" text-anchor="middle" fill="#60a5fa" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600">WCA stats · ranks · Top % · goals</text>
  <rect x="1" y="1" width="958" height="218" rx="19" fill="none" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="1.5"/>
</svg>
